databases:
  - name: instant-wellness-kits-db
    plan: free
    databaseName: instant_wellness_kits
    user: iwk

services:
  - type: web
    name: instant-wellness-kits
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm run build:all
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: instant-wellness-kits-db
          property: connectionString
      - key: NODE_ENV
        value: production
